<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WebStudio Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

nav{
display:flex;
justify-content:space-between;
padding:20px;
background:#111827;
}

.hero{
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:40px;
}

section{
padding:60px 20px;
text-align:center;
}

.grid{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:#1f2937;
padding:20px;
border-radius:12px;
width:250px;
}

form{
display:flex;
flex-direction:column;
gap:10px;
max-width:350px;
margin:auto;
}

input,textarea{
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
background:white;
border:none;
cursor:pointer;
border-radius:6px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:12px;
border-radius:50px;
color:white;
text-decoration:none;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>

<body>

<nav>
<div>WebStudio Pro</div>
</nav>

<header class="hero">
<h1>Websites die klanten opleveren</h1>
<p>Premium webdesign voor ondernemers</p>
</header>

<section>
<h2>Pakketten</h2>

<div class="grid">

<div class="card">
<h3>Starter</h3>
<p>€129</p>
<p>1 pagina website</p>
</div>

<div class="card">
<h3>Business</h3>
<p>€299</p>
<p>Meest gekozen</p>
</div>

<div class="card">
<h3>Premium</h3>
<p>€599</p>
<p>Complete website</p>
</div>

</div>
</section>

<section>
<h2>Contact</h2>

<form id="form">
<input id="name" placeholder="Naam" required>
<input id="email" placeholder="Email" required>
<textarea id="message" placeholder="Bericht" required></textarea>

<button type="submit">Versturen</button>
</form>

<p id="status"></p>

<a class="whatsapp" href="https://wa.me/31625166241">WhatsApp</a>
</section>

<script>
emailjs.init("fg3x9snV40S-ijke0");

document.getElementById("form").addEventListener("submit", function(e){
e.preventDefault();

document.getElementById("status").innerText = "Versturen...";

emailjs.send("service_z81n99u","template_csno00g",{
from_name: document.getElementById("name").value,
from_email: document.getElementById("email").value,
message: document.getElementById("message").value
})

.then(()=>{
document.getElementById("status").innerText = "Succes!";
document.getElementById("form").reset();
})

.catch(()=>{
document.getElementById("status").innerText = "Fout bij verzenden";
});
});
</script>

</body>
</html>
